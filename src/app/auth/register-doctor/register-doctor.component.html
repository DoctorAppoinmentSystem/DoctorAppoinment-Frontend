<!-- src/app/auth/register-doctor/register-doctor.component.html -->
<div class="auth-container">
  <div class="auth-card" style="max-width:580px">
    <div class="auth-header">
      <div class="logo">👨‍⚕️</div>
      <h1>Doctor Registration</h1>
      <p>Join our medical network</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" formControlName="name" class="form-control" placeholder="Dr. Full Name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" formControlName="phone" class="form-control" placeholder="Phone number">
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" formControlName="email" class="form-control" placeholder="doctor@email.com">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Min 6 characters">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Specialization *</label>
          <select formControlName="specializationId" class="form-control">
            <option value="">-- Select Specialty --</option>
            <optgroup *ngFor="let group of getGroups()" [label]="group">
              <option *ngFor="let s of getByCategory(group)" [value]="s.id">{{ s.name }}</option>
            </optgroup>
          </select>
        </div>
        <div class="form-group">
          <label>Consultation Mode *</label>
          <select formControlName="mode" class="form-control">
            <option value="">-- Select Mode --</option>
            <option value="Online">🌐 Online (Teleconsultation)</option>
            <option value="Offline">🏥 Offline (In-Clinic)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Degree/Qualification</label>
          <input type="text" formControlName="degree" class="form-control" placeholder="MBBS, MD, etc.">
        </div>
        <div class="form-group">
          <label>Experience (years)</label>
          <input type="number" formControlName="experience" class="form-control" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea formControlName="address" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register as Doctor' }}
      </button>
    </form>
  </div>
</div>
