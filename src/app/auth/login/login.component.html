<!-- src/app/auth/login/login.component.html -->
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">🏥</div>
      <h1>Doctor Appointment System</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email"
               placeholder="Enter your email" class="form-control"
               [class.is-invalid]="loginForm.get('email')?.invalid &&
                                    loginForm.get('email')?.touched">
        <div class="error-msg" *ngIf="loginForm.get('email')?.errors?.['email']
                                    && loginForm.get('email')?.touched">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password"
               placeholder="Enter your password" class="form-control">
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner">...</span>
      </button>
    </form>

    <div class="auth-links">
      <p>New patient? <a routerLink="/register-patient">Register here</a></p>
      <p>Are you a doctor? <a routerLink="/register-doctor">Doctor Register</a></p>
    </div>
  </div>
</div>
