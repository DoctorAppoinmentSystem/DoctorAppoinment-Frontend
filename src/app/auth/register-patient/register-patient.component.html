<!-- src/app/auth/register-patient/register-patient.component.html -->
<div class="auth-container">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-header">
      <div class="logo">👤</div>
      <h1>Patient Registration</h1>
      <p>Create your patient account</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" formControlName="name" placeholder="Your full name" class="form-control">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" formControlName="phone" placeholder="Phone number" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" formControlName="email" placeholder="your@email.com" class="form-control">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" formControlName="password" placeholder="Min 6 characters" class="form-control">
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea formControlName="address" placeholder="Your address" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </form>
    <div class="auth-links">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </div>
</div>
